name: run-java

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,6,12,18 * * *'

jobs:
  run:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Random gate
        id: gate
        run: |
          if [ $((RANDOM % 5)) -eq 0 ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Show gate result
        run: echo "GATE RUN = ${{ steps.gate.outputs.run }}"

      - name: Checkout repo
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup JDK
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Javac and run
        if: steps.gate.outputs.run == 'true'
        run: |
          javac mainFunction.java
          java mainFunction
          
      - name: Commit generated file
        if: steps.gate.outputs.run == 'true'
        run: |
          git config --local user.email "165192062+whillow-ann@users.noreply.github.com"
          git config --local user.name "whillow-ann"
          git add .
          git commit -m "Auto contribution 1" || echo "no changes"
      
      - name: Push back to main
        if: steps.gate.outputs.run == 'true'
        run: git push
